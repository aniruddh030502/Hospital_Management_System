<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f0f0;
        }

        .container {
            background-color: #fff;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin: 50px auto;
            width: 80%;
            max-width: 600px;
        }

        h1 {
            color: #333;
        }

        .admin-options {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 20px;
        }

        .admin-option {
            margin: 10px;
            padding: 10px 20px;
            background-color: #007bff; /* Blue color, you can change it */
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }

        .admin-option:hover {
            background-color: #0056b3; /* Darker blue color on hover */
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Admin Dashboard</h1>
        <div class="admin-options">
            <a href="bed_details" class="admin-option">View Bed Details</a>
            <a href="showbedapp" class="admin-option">Approve Bed Applications</a>
            <a href="bed_discharge" class="admin-option">Discharge Bed Applications</a>
        </div>
    </div>
</body>
</html>
